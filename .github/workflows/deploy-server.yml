name: Deploy Node Server via AWS SSM (OIDC)

on:
  push:
    branches:
      - main
    paths:
      - 'server/**'

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS Credentials using OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Send Deployment Command via SSM
        run: |
          aws ssm send-command \
          --instance-ids "${{ secrets.EC2_INSTANCE_ID }}" \
          --document-name "AWS-RunShellScript" \
          --comment "Deploying backend from GitHub Actions" \
          --parameters 'commands=["sudo -u ubuntu bash -c \"cd /home/ubuntu/ISA-WEB/server && git pull origin main && npm install && pm2 restart api_server\""]' \
          --timeout-seconds 60 \
          --max-concurrency "50" \
          --max-errors "0"